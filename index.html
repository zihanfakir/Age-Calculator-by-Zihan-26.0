<!DOCTYPE html>
<html lang="bn" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>বয়স ক্যালকুলেটর | @zihanfakir</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Noto+Sans+Bengali:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root[data-theme="dark"] {
    --bg: #0f0e17;
    --bg2: #1a1828;
    --card: #1e1c2e;
    --card2: #252338;
    --border: #2e2b45;
    --accent: #7c5cfc;
    --accent2: #a78bfa;
    --accent3: #f472b6;
    --text: #e8e6f0;
    --text2: #a09ab8;
    --text3: #6b6484;
    --glow: rgba(124,92,252,0.18);
    --glow2: rgba(247,72,182,0.10);
    --stat-bg: #231f36;
    --toggle-bg: #252338;
    --shadow: 0 8px 40px rgba(0,0,0,0.45);
    --btn-text: #fff;
  }
  :root[data-theme="light"] {
    --bg: #f0eeff;
    --bg2: #e8e4ff;
    --card: #ffffff;
    --card2: #f5f3ff;
    --border: #ddd8ff;
    --accent: #6c3fd8;
    --accent2: #7c5cfc;
    --accent3: #e11d87;
    --text: #1a1530;
    --text2: #4b4470;
    --text3: #8b84a8;
    --glow: rgba(108,63,216,0.10);
    --glow2: rgba(225,29,135,0.07);
    --stat-bg: #ede9ff;
    --toggle-bg: #e0daff;
    --shadow: 0 8px 40px rgba(108,63,216,0.13);
    --btn-text: #fff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Hind Siliguri', 'Noto Sans Bengali', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background 0.35s, color 0.35s;
    overflow-x: hidden;
  }

  /* BG mesh */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 10%, var(--glow) 0%, transparent 70%),
      radial-gradient(ellipse 50% 40% at 80% 85%, var(--glow2) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 820px;
    margin: 0 auto;
    padding: 28px 16px 60px;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 36px;
  }
  .logo-area h1 {
    font-size: clamp(1.4rem, 4vw, 2rem);
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent2), var(--accent3));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.5px;
  }
  .logo-area p {
    font-size: 0.78rem;
    color: var(--text3);
    margin-top: 2px;
  }

  /* Toggle */
  .theme-toggle {
    background: var(--toggle-bg);
    border: 1.5px solid var(--border);
    border-radius: 50px;
    padding: 6px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    font-size: 0.82rem;
    color: var(--text2);
    font-family: inherit;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .theme-toggle:hover { border-color: var(--accent); color: var(--accent2); }
  .theme-toggle .icon { font-size: 1.05rem; }

  /* Input Card */
  .input-card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 32px 28px;
    box-shadow: var(--shadow);
    margin-bottom: 28px;
    transition: background 0.35s, border 0.35s;
  }
  .input-card h2 {
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--text2);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .input-card h2 span { font-size: 1.2rem; }

  .date-row {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
  }
  .date-group {
    flex: 1;
    min-width: 120px;
  }
  .date-group label {
    display: block;
    font-size: 0.78rem;
    color: var(--text3);
    margin-bottom: 7px;
    font-weight: 500;
    letter-spacing: 0.4px;
  }
  .date-group select, .date-group input {
    width: 100%;
    background: var(--card2);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 11px 14px;
    color: var(--text);
    font-family: inherit;
    font-size: 0.95rem;
    outline: none;
    transition: border 0.2s, box-shadow 0.2s;
    appearance: none;
    -webkit-appearance: none;
    cursor: pointer;
  }
  .date-group select:focus, .date-group input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--glow);
  }
  .date-group.year-group { min-width: 140px; }
  .date-group.year-group input { text-align: center; }

  .calc-btn {
    width: 100%;
    margin-top: 20px;
    padding: 14px;
    background: linear-gradient(135deg, var(--accent), var(--accent3));
    border: none;
    border-radius: 14px;
    color: var(--btn-text);
    font-family: inherit;
    font-size: 1.05rem;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.2s, opacity 0.2s;
    box-shadow: 0 4px 20px rgba(124,92,252,0.3);
    letter-spacing: 0.3px;
  }
  .calc-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(124,92,252,0.4); }
  .calc-btn:active { transform: translateY(0); }

  /* Results */
  .results { display: none; }
  .results.show { display: block; animation: fadeUp 0.4s ease; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Age Hero */
  .age-hero {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 30px 24px;
    text-align: center;
    margin-bottom: 20px;
    box-shadow: var(--shadow);
    position: relative;
    overflow: hidden;
  }
  .age-hero::before {
    content: '';
    position: absolute;
    top: -60px; left: 50%;
    transform: translateX(-50%);
    width: 280px; height: 160px;
    background: radial-gradient(ellipse, var(--glow) 0%, transparent 70%);
    pointer-events: none;
  }
  .age-hero .big-age {
    font-size: clamp(3.5rem, 12vw, 6rem);
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent2), var(--accent3));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    margin-bottom: 4px;
  }
  .age-hero .age-label {
    font-size: 0.95rem;
    color: var(--text2);
    margin-bottom: 18px;
  }
  .exact-age {
    font-size: 0.92rem;
    color: var(--text3);
    background: var(--stat-bg);
    border-radius: 50px;
    padding: 7px 18px;
    display: inline-block;
  }
  .exact-age span { color: var(--accent2); font-weight: 600; }

  /* Stats Grid */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
    gap: 14px;
    margin-bottom: 20px;
  }
  .stat-card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 18px 16px;
    text-align: center;
    transition: transform 0.2s, border-color 0.2s;
    box-shadow: var(--shadow);
  }
  .stat-card:hover { transform: translateY(-3px); border-color: var(--accent); }
  .stat-card .icon { font-size: 1.6rem; margin-bottom: 8px; display: block; }
  .stat-card .val {
    font-size: clamp(1.3rem, 4vw, 1.7rem);
    font-weight: 700;
    color: var(--accent2);
    display: block;
    line-height: 1;
    word-break: break-all;
  }
  .stat-card .lbl {
    font-size: 0.75rem;
    color: var(--text3);
    margin-top: 4px;
    display: block;
  }

  /* Birthday cards */
  .event-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 20px;
  }
  @media (max-width: 520px) { .event-row { grid-template-columns: 1fr; } }

  .event-card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    box-shadow: var(--shadow);
  }
  .event-card.birthday { border-color: rgba(124,92,252,0.4); }
  .event-card.halfbirthday { border-color: rgba(244,114,182,0.4); }
  .event-card .ev-head {
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .event-card.birthday .ev-head { color: var(--accent2); }
  .event-card.halfbirthday .ev-head { color: var(--accent3); }
  .event-card .ev-date {
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
  }
  .event-card .ev-countdown {
    font-size: 0.85rem;
    color: var(--text3);
    line-height: 1.5;
  }
  .event-card .ev-countdown strong { color: var(--text2); }

  /* Live Ticker */
  .live-ticker {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 22px 20px;
    margin-bottom: 20px;
    box-shadow: var(--shadow);
  }
  .live-ticker h3 {
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--text3);
    letter-spacing: 0.8px;
    text-transform: uppercase;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .live-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #22c55e;
    box-shadow: 0 0 7px #22c55e;
    animation: pulse 1.2s infinite;
    display: inline-block;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }

  .ticker-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 10px;
  }
  .tick-item {
    background: var(--stat-bg);
    border-radius: 12px;
    padding: 12px;
    text-align: center;
  }
  .tick-item .t-val {
    font-size: clamp(1.1rem, 3.5vw, 1.4rem);
    font-weight: 700;
    color: var(--accent2);
    display: block;
    font-variant-numeric: tabular-nums;
    word-break: break-all;
  }
  .tick-item .t-lbl { font-size: 0.72rem; color: var(--text3); margin-top: 2px; display: block; }

  /* Fun facts */
  .fun-facts {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 22px 20px;
    box-shadow: var(--shadow);
    margin-bottom: 20px;
  }
  .fun-facts h3 {
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--text3);
    letter-spacing: 0.8px;
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .fact-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
  .fact-list li {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.88rem;
    color: var(--text2);
    background: var(--stat-bg);
    border-radius: 10px;
    padding: 10px 14px;
  }
  .fact-list li .fi { font-size: 1.1rem; flex-shrink: 0; }
  .fact-list li strong { color: var(--accent2); }

  /* Footer */
  footer {
    text-align: center;
    padding-top: 24px;
    font-size: 0.76rem;
    color: var(--text3);
  }
  footer a { color: var(--accent2); text-decoration: none; }
  footer a:hover { text-decoration: underline; }

  /* Error */
  .error-msg {
    background: rgba(239,68,68,0.12);
    border: 1.5px solid rgba(239,68,68,0.3);
    border-radius: 12px;
    padding: 12px 16px;
    color: #f87171;
    font-size: 0.88rem;
    margin-top: 12px;
    display: none;
  }

  @media (max-width: 480px) {
    .input-card { padding: 22px 16px; }
    .age-hero { padding: 24px 16px; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo-area">
      <h1>🎂 বয়স ক্যালকুলেটর</h1>
      <p>সম্পূর্ণ বিস্তারিত বয়স হিসাব করুন</p>
    </div>
    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">
      <span class="icon">🌙</span>
      <span id="themeLabel">লাইট মোড</span>
    </button>
  </header>

  <!-- Input -->
  <div class="input-card">
    <h2><span>📅</span> জন্ম তারিখ লিখুন</h2>
    <div class="date-row">
      <div class="date-group">
        <label>দিন</label>
        <select id="dd">
          <option value="">দিন</option>
        </select>
      </div>
      <div class="date-group">
        <label>মাস</label>
        <select id="mm">
          <option value="">মাস</option>
          <option value="1">জানুয়ারি</option>
          <option value="2">ফেব্রুয়ারি</option>
          <option value="3">মার্চ</option>
          <option value="4">এপ্রিল</option>
          <option value="5">মে</option>
          <option value="6">জুন</option>
          <option value="7">জুলাই</option>
          <option value="8">আগস্ট</option>
          <option value="9">সেপ্টেম্বর</option>
          <option value="10">অক্টোবর</option>
          <option value="11">নভেম্বর</option>
          <option value="12">ডিসেম্বর</option>
        </select>
      </div>
      <div class="date-group year-group">
        <label>বছর</label>
        <input type="number" id="yyyy" placeholder="যেমন: 1999" min="1900" max="2025">
      </div>
    </div>
    <div class="error-msg" id="errMsg">⚠️ সঠিক জন্ম তারিখ দিন।</div>
    <button class="calc-btn" onclick="calculate()">✨ বয়স হিসাব করুন</button>
  </div>

  <!-- Results -->
  <div class="results" id="results">

    <!-- Big Age -->
    <div class="age-hero">
      <div class="big-age" id="bigAge">0</div>
      <div class="age-label">বছর বয়স</div>
      <div class="exact-age" id="exactAge"></div>
    </div>

    <!-- Stats -->
    <div class="stats-grid" id="statsGrid"></div>

    <!-- Events -->
    <div class="event-row">
      <div class="event-card birthday">
        <div class="ev-head">🎉 পরবর্তী জন্মদিন</div>
        <div class="ev-date" id="nextBdDate"></div>
        <div class="ev-countdown" id="nextBdCountdown"></div>
      </div>
      <div class="event-card halfbirthday">
        <div class="ev-head">🎈 পরবর্তী অর্ধ-জন্মদিন</div>
        <div class="ev-date" id="nextHbDate"></div>
        <div class="ev-countdown" id="nextHbCountdown"></div>
      </div>
    </div>

    <!-- Live Ticker -->
    <div class="live-ticker">
      <h3><span class="live-dot"></span> লাইভ কাউন্টার</h3>
      <div class="ticker-grid" id="tickerGrid"></div>
    </div>

    <!-- Fun Facts -->
    <div class="fun-facts">
      <h3>🔢 মজার তথ্য</h3>
      <ul class="fact-list" id="factList"></ul>
    </div>

  </div>

  <footer>
    তৈরি করেছেন <a href="#">@zihanfakir</a> &bull; বাংলা বয়স ক্যালকুলেটর
  </footer>
</div>

<script>
  // Fill days
  const ddEl = document.getElementById('dd');
  for (let i = 1; i <= 31; i++) {
    const o = document.createElement('option');
    o.value = i; o.textContent = i + ' তারিখ';
    ddEl.appendChild(o);
  }

  const BN_MONTHS = ['জানুয়ারি','ফেব্রুয়ারি','মার্চ','এপ্রিল','মে','জুন','জুলাই','আগস্ট','সেপ্টেম্বর','অক্টোবর','নভেম্বর','ডিসেম্বর'];
  const BN_DAYS_NAME = ['রবিবার','সোমবার','মঙ্গলবার','বুধবার','বৃহস্পতিবার','শুক্রবার','শনিবার'];

  function toBN(n) {
    return String(Math.round(n)).replace(/[0-9]/g, d => '০১২৩৪৫৬৭৮৯'[d]);
  }
  function fmtDate(d) {
    return `${BN_DAYS_NAME[d.getDay()]}, ${d.getDate()} ${BN_MONTHS[d.getMonth()]} ${d.getFullYear()}`;
  }
  function fmtNum(n) {
    return Math.round(n).toLocaleString('en-IN');
  }

  function toggleTheme() {
    const html = document.documentElement;
    const isDark = html.getAttribute('data-theme') === 'dark';
    html.setAttribute('data-theme', isDark ? 'light' : 'dark');
    document.getElementById('themeBtn').querySelector('.icon').textContent = isDark ? '☀️' : '🌙';
    document.getElementById('themeLabel').textContent = isDark ? 'ডার্ক মোড' : 'লাইট মোড';
  }

  let tickerInterval = null;

  function calculate() {
    const dd = parseInt(document.getElementById('dd').value);
    const mm = parseInt(document.getElementById('mm').value);
    const yyyy = parseInt(document.getElementById('yyyy').value);
    const err = document.getElementById('errMsg');

    err.style.display = 'none';

    if (!dd || !mm || !yyyy || yyyy < 1900 || yyyy > new Date().getFullYear()) {
      err.style.display = 'block'; return;
    }

    const birth = new Date(yyyy, mm - 1, dd);
    if (isNaN(birth.getTime()) || birth > new Date()) {
      err.style.display = 'block'; return;
    }

    // Show results
    document.getElementById('results').classList.add('show');

    function update() {
      const now = new Date();
      const diffMs = now - birth;

      // Years
      let years = now.getFullYear() - birth.getFullYear();
      let months = now.getMonth() - birth.getMonth();
      let days = now.getDate() - birth.getDate();

      if (days < 0) {
        months--;
        const prevMonth = new Date(now.getFullYear(), now.getMonth(), 0);
        days += prevMonth.getDate();
      }
      if (months < 0) { years--; months += 12; }

      // Big age
      document.getElementById('bigAge').textContent = toBN(years);
      document.getElementById('exactAge').innerHTML =
        `<span>${toBN(years)}</span> বছর, <span>${toBN(months)}</span> মাস, <span>${toBN(days)}</span> দিন`;

      // Time totals
      const totalDays    = Math.floor(diffMs / 86400000);
      const totalHours   = Math.floor(diffMs / 3600000);
      const totalMins    = Math.floor(diffMs / 60000);
      const totalSecs    = Math.floor(diffMs / 1000);
      const totalMonths  = years * 12 + months;
      const totalWeeks   = Math.floor(totalDays / 7);

      // Stats Grid
      const stats = [
        { icon: '📅', val: fmtNum(totalDays), lbl: 'মোট দিন' },
        { icon: '📆', val: fmtNum(totalWeeks), lbl: 'মোট সপ্তাহ' },
        { icon: '🗓️', val: fmtNum(totalMonths), lbl: 'মোট মাস' },
        { icon: '⏰', val: fmtNum(totalHours), lbl: 'মোট ঘন্টা' },
        { icon: '⏱️', val: fmtNum(totalMins), lbl: 'মোট মিনিট' },
        { icon: '⚡', val: fmtNum(totalSecs), lbl: 'মোট সেকেন্ড' },
      ];
      const sg = document.getElementById('statsGrid');
      sg.innerHTML = stats.map(s =>
        `<div class="stat-card"><span class="icon">${s.icon}</span><span class="val">${s.val}</span><span class="lbl">${s.lbl}</span></div>`
      ).join('');

      // Next Birthday
      let nextBd = new Date(now.getFullYear(), birth.getMonth(), birth.getDate());
      if (nextBd <= now) nextBd.setFullYear(nextBd.getFullYear() + 1);
      const bdDiff = nextBd - now;
      const bdDays = Math.floor(bdDiff / 86400000);
      const bdHrs  = Math.floor((bdDiff % 86400000) / 3600000);
      const bdMins = Math.floor((bdDiff % 3600000) / 60000);

      document.getElementById('nextBdDate').textContent = fmtDate(nextBd);
      document.getElementById('nextBdCountdown').innerHTML =
        `<strong>${toBN(bdDays)}</strong> দিন <strong>${toBN(bdHrs)}</strong> ঘন্টা <strong>${toBN(bdMins)}</strong> মিনিট বাকি`;

      // Next Half Birthday (6 months after birthday)
      const halfMs = 365.25 / 2 * 86400000;
      let nextHb = new Date(birth.getTime());
      nextHb.setMonth(nextHb.getMonth() + 6);
      // Find next upcoming half-birthday
      while (nextHb <= now) {
        nextHb.setFullYear(nextHb.getFullYear() + 1);
      }
      const hbDiff = nextHb - now;
      const hbDays = Math.floor(hbDiff / 86400000);
      const hbHrs  = Math.floor((hbDiff % 86400000) / 3600000);
      const hbMins = Math.floor((hbDiff % 3600000) / 60000);

      document.getElementById('nextHbDate').textContent = fmtDate(nextHb);
      document.getElementById('nextHbCountdown').innerHTML =
        `<strong>${toBN(hbDays)}</strong> দিন <strong>${toBN(hbHrs)}</strong> ঘন্টা <strong>${toBN(hbMins)}</strong> মিনিট বাকি`;

      // Live ticker
      const tickerGrid = document.getElementById('tickerGrid');
      const tItems = [
        { val: fmtNum(totalDays),  lbl: 'মোট দিন' },
        { val: fmtNum(totalHours), lbl: 'মোট ঘন্টা' },
        { val: fmtNum(totalMins),  lbl: 'মোট মিনিট' },
        { val: fmtNum(totalSecs),  lbl: 'মোট সেকেন্ড' },
      ];
      if (!tickerGrid.children.length) {
        tickerGrid.innerHTML = tItems.map((t,i) =>
          `<div class="tick-item"><span class="t-val" id="tv${i}">${t.val}</span><span class="t-lbl">${t.lbl}</span></div>`
        ).join('');
      } else {
        tItems.forEach((t,i) => {
          const el = document.getElementById('tv'+i);
          if (el) el.textContent = t.val;
        });
      }

      // Fun facts
      const heartbeats = Math.round(totalMins * 72);
      const breaths    = Math.round(totalMins * 16);
      const sleepDays  = Math.round(totalDays * 0.33);
      const ageOnMars  = (totalDays / 686.97).toFixed(1);
      const ageOnMoon  = (totalDays / 29.53).toFixed(0);
      const blink      = Math.round(totalHours * 900);

      document.getElementById('factList').innerHTML = `
        <li><span class="fi">❤️</span> আনুমানিক <strong>${fmtNum(heartbeats)}</strong> বার হার্টবিট হয়েছে</li>
        <li><span class="fi">💨</span> আনুমানিক <strong>${fmtNum(breaths)}</strong> বার শ্বাস নিয়েছেন</li>
        <li><span class="fi">😴</span> আনুমানিক <strong>${fmtNum(sleepDays)}</strong> দিন ঘুমিয়েছেন</li>
        <li><span class="fi">👁️</span> আনুমানিক <strong>${fmtNum(blink)}</strong> বার চোখ পলক ফেলেছেন</li>
        <li><span class="fi">🔴</span> মঙ্গলগ্রহে আপনার বয়স হত <strong>${ageOnMars}</strong> বছর</li>
        <li><span class="fi">🌕</span> চাঁদের হিসেবে আপনার বয়স <strong>${fmtNum(ageOnMoon)}</strong> চাঁদ-মাস</li>
      `;
    }

    clearInterval(tickerInterval);
    update();
    tickerInterval = setInterval(update, 1000);

    // Scroll to results smoothly
    setTimeout(() => {
      document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 100);
  }

  // Enter key support
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') calculate();
  });
</script>
</body>
</html>
